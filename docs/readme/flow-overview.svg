<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">agent-comm end-to-end flow</title>
  <desc id="desc">User request flows from coordinator to task author, dispatcher, worker pools, reports, and back to the user.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe4f0; stroke-width: 2; }
      .panel-soft { fill: #f8fbff; stroke: #dbe4f0; stroke-width: 2; }
      .blue { fill: #e0ecff; stroke: #93c5fd; }
      .amber { fill: #fff3dd; stroke: #fdba74; }
      .mint { fill: #def7ec; stroke: #6ee7b7; }
      .violet { fill: #ede9fe; stroke: #c4b5fd; }
      .text { fill: #0f172a; font: 600 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #334155; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.03em; }
      .small { fill: #475569; font: 500 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .line-soft { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .line-amber { stroke: #ea580c; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .line-muted { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="520" rx="28"/>
  <text x="44" y="52" class="text">agent-comm flow</text>
  <text x="44" y="80" class="small">User request → task breakdown → dispatch → reports → final answer</text>

  <rect x="36" y="182" width="164" height="88" rx="22" class="panel blue"/>
  <text x="118" y="220" text-anchor="middle" class="label">User</text>
  <text x="118" y="246" text-anchor="middle" class="tiny">request / answer</text>

  <rect x="246" y="182" width="190" height="88" rx="22" class="panel blue"/>
  <text x="341" y="220" text-anchor="middle" class="label">Coordinator</text>
  <text x="341" y="246" text-anchor="middle" class="tiny">entry point for the user</text>

  <rect x="480" y="82" width="200" height="72" rx="20" class="panel-soft amber"/>
  <text x="580" y="122" text-anchor="middle" class="label">command.yaml</text>

  <rect x="480" y="182" width="200" height="88" rx="22" class="panel amber"/>
  <text x="580" y="220" text-anchor="middle" class="label">task_author</text>
  <text x="580" y="246" text-anchor="middle" class="tiny">turns one request into tasks</text>

  <rect x="730" y="82" width="214" height="72" rx="20" class="panel-soft amber"/>
  <text x="837" y="114" text-anchor="middle" class="label">tasks/*.yaml</text>
  <text x="837" y="138" text-anchor="middle" class="tiny">and reviews/*.yaml</text>

  <rect x="730" y="182" width="214" height="88" rx="22" class="panel amber"/>
  <text x="837" y="220" text-anchor="middle" class="label">Dispatcher</text>
  <text x="837" y="246" text-anchor="middle" class="tiny">routes work to the right agent</text>

  <rect x="990" y="54" width="368" height="300" rx="28" class="panel-soft"/>
  <text x="1174" y="96" text-anchor="middle" class="label">Agents and Pools</text>

  <rect x="1022" y="122" width="146" height="74" rx="18" class="panel mint"/>
  <text x="1095" y="154" text-anchor="middle" class="label">Research</text>
  <text x="1095" y="178" text-anchor="middle" class="tiny">investigation / analyst</text>

  <rect x="1182" y="122" width="144" height="74" rx="18" class="panel mint"/>
  <text x="1254" y="154" text-anchor="middle" class="label">Implementers</text>
  <text x="1254" y="178" text-anchor="middle" class="tiny">implementation / rework</text>

  <rect x="1022" y="222" width="146" height="74" rx="18" class="panel mint"/>
  <text x="1095" y="266" text-anchor="middle" class="label">Tester</text>

  <rect x="1182" y="222" width="144" height="74" rx="18" class="panel violet"/>
  <text x="1254" y="254" text-anchor="middle" class="label">Reviewers</text>
  <text x="1254" y="278" text-anchor="middle" class="tiny">fan-out → aggregate</text>

  <rect x="730" y="388" width="214" height="72" rx="20" class="panel-soft blue"/>
  <text x="837" y="420" text-anchor="middle" class="label">reports / events</text>
  <text x="837" y="444" text-anchor="middle" class="tiny">progress, test, review, artifacts</text>

  <path d="M200 226 L246 226" class="line"/>
  <path d="M436 206 L480 206 L480 118" class="line"/>
  <path d="M680 118 L730 118" class="line"/>
  <path d="M680 226 L730 226" class="line"/>

  <path d="M944 204 L988 160 L1022 160" class="line"/>
  <path d="M944 220 L1008 220 L1182 160" class="line"/>
  <path d="M944 236 L1008 236 L1022 258" class="line"/>
  <path d="M944 252 L1008 252 L1182 258" class="line"/>

  <path d="M1095 196 L1095 388 L944 388" class="line-soft"/>
  <path d="M1254 196 L1254 388 L944 388" class="line-soft"/>
  <path d="M1095 296 L1095 388" class="line-soft"/>
  <path d="M1254 296 L1254 388" class="line-soft"/>

  <path d="M730 424 L680 424 L680 246" class="line-amber"/>
  <path d="M480 246 L436 246" class="line-amber"/>
  <path d="M246 246 L200 246" class="line-amber"/>

  <text x="44" y="484" class="tiny">One request becomes task files, worker reports come back through .runtime, and coordinator returns the final answer.</text>
</svg>
