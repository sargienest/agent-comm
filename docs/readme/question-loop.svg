<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">agent-comm question and answer loop</title>
  <desc id="desc">A worker opens a question, the task is blocked, the coordinator answers, and the dispatcher resumes the task.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe4f0; stroke-width: 2; }
      .blue { fill: #e0ecff; stroke: #93c5fd; }
      .amber { fill: #fff3dd; stroke: #fdba74; }
      .mint { fill: #def7ec; stroke: #6ee7b7; }
      .violet { fill: #ede9fe; stroke: #c4b5fd; }
      .text { fill: #0f172a; font: 600 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #334155; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.03em; }
      .tiny { fill: #64748b; font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .line-soft { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="320" rx="28"/>
  <text x="40" y="52" class="text">question / answer loop</text>

  <rect x="40" y="120" width="160" height="82" rx="22" class="panel blue"/>
  <text x="120" y="154" text-anchor="middle" class="label">Worker</text>
  <text x="120" y="178" text-anchor="middle" class="tiny">needs clarification</text>

  <rect x="256" y="54" width="210" height="72" rx="20" class="panel amber"/>
  <text x="361" y="94" text-anchor="middle" class="label">questions/open/*.yaml</text>

  <rect x="256" y="168" width="210" height="72" rx="20" class="panel violet"/>
  <text x="361" y="208" text-anchor="middle" class="label">blocked task</text>

  <rect x="524" y="120" width="180" height="82" rx="22" class="panel amber"/>
  <text x="614" y="154" text-anchor="middle" class="label">Dispatcher</text>
  <text x="614" y="178" text-anchor="middle" class="tiny">notifies and resumes</text>

  <rect x="764" y="120" width="190" height="82" rx="22" class="panel blue"/>
  <text x="859" y="154" text-anchor="middle" class="label">Coordinator</text>
  <text x="859" y="178" text-anchor="middle" class="tiny">answers the question</text>

  <rect x="1012" y="54" width="220" height="72" rx="20" class="panel mint"/>
  <text x="1122" y="94" text-anchor="middle" class="label">questions/answered/*.yaml</text>

  <rect x="1012" y="168" width="220" height="72" rx="20" class="panel mint"/>
  <text x="1122" y="208" text-anchor="middle" class="label">pending task</text>

  <path d="M200 142 L256 90" class="line"/>
  <path d="M200 180 L256 204" class="line"/>
  <path d="M466 90 L524 142" class="line"/>
  <path d="M704 162 L764 162" class="line"/>
  <path d="M954 142 L1012 90" class="line"/>
  <path d="M1122 126 L1122 168" class="line-soft"/>
  <path d="M1012 204 L200 204" class="line-soft"/>

  <text x="42" y="284" class="tiny">Worker asks → task is blocked → coordinator answers → dispatcher injects the answer and puts the task back into the queue.</text>
</svg>
